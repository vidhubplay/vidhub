<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream HD | Member Access</title>
    
    <!-- 1. ANTI-BOT META TAGS -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="facebookbot" content="noindex">
    <meta name="twitterbot" content="noindex">

    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --brand-color: #ff9000;
            --bg-black: #000000;
            --surface-grey: #1b1b1b;
            --text-dim: #999;
        }

        /* 2. ANTI-COPY CSS */
        body { 
            margin: 0; background: var(--bg-black); color: #fff; 
            font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent;
            **-webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;**
        }

        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a;
        }
        .burger { font-size: 24px; color: var(--brand-color); cursor: pointer; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #fff; text-decoration: none; }
        .logo span { background: var(--brand-color); color: #000; padding: 1px 5px; border-radius: 3px; margin-left: 1px; }

        .scroller { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .chip { background: #252525; padding: 10px 22px; border-radius: 25px; font-size: 14px; white-space: nowrap; font-weight: 500; color: #efefef; border: 1px solid #333; }

        /* PLAYER SYSTEM */
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        #ad-layer { position: absolute; inset: 0; z-index: 99; cursor: pointer; background: rgba(0,0,0,0); }
        #thumbnail { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #video-iframe { width: 100%; height: 100%; display: none; border: none; }

        .play-icon-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0; height: 0; border-top: 25px solid transparent; 
            border-bottom: 25px solid transparent; border-left: 40px solid #fff;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); z-index: 10; pointer-events: none;
        }

        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--brand-color); border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite; z-index: 11;
        }

        .time-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; pointer-events: none;
        }

        .details { padding: 15px; }
        .v-title { font-size: 19px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
        .v-stats { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
        .big-cta {
            background: var(--brand-color); color: #000; width: 100%; border: none;
            padding: 16px; border-radius: 35px; font-weight: 900; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; cursor: pointer;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="burger">☰</div>
    <a href="#" class="logo">Vid<span>Hub</span></a>
    <div style="font-size: 18px;">🔍</div>
</header>

<div class="scroller">
    <div class="chip">Mylf</div><div class="chip">Taboo</div><div class="chip">Tattoos</div><div class="chip">Stepson</div>
</div>

<div class="player-container">
    <div id="ad-layer" onclick="handleAdSystem()"></div>
    <div id="loader-icon" class="loader"></div>
    <img id="thumbnail" src="https://i.ibb.co.com/cX7Gz3rk/Screenshot-2026-04-17-23-40-09-669-com-android-chrome-edit.jpg" alt="Thumbnail">
    <iframe id="video-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    <div id="play-ui" class="play-icon-center"></div>
    <div id="time-ui" class="time-overlay">
        <span>00:00</span><span>25:15</span>
    </div>
</div>

<div class="details">
    <div class="v-title">Bored Stepson needs some Distraction with...</div>
    <div class="v-stats">1.8M Views • 2 days ago</div>
    <button class="big-cta" onclick="handleAdSystem()">↗️ Watch Full HD Now</button>
</div>

<!-- 3. ANTI-COPY & PLAYER SCRIPT -->
<script>
    // Matikan Klik Kanan
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Matikan Shortcuts (F12, Ctrl+U, Ctrl+C, dll)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0)))) {
            return false;
        }
    };

    const AD_URL = "https://seenimplieddump.com/u0izx7tdt2?key=2da91b9d1f78ac56c6ae64b347258655";
    const VIDEO_URL = "https://cdn2.aceimg.com/69f7d106e.mp4"; 
    const KLIK_REQUIRED = 2; 
    let count = 0;

    function handleAdSystem() {
        count++;
        window.open(AD_URL, '_blank');
        const loader = document.getElementById('loader-icon');
        const playBtn = document.getElementById('play-ui');
        playBtn.style.display = "none";
        loader.style.display = "block";

        if (count >= KLIK_REQUIRED) {
            setTimeout(() => {
                document.getElementById('ad-layer').style.display = "none";
                document.getElementById('thumbnail').style.display = "none";
                document.getElementById('time-ui').style.display = "none";
                loader.style.display = "none";
                const v = document.getElementById('video-iframe');
                v.src = VIDEO_URL;
                v.style.display = "block";
            }, 1500);
        } else {
            setTimeout(() => {
                loader.style.display = "none";
                playBtn.style.display = "block";
            }, 1000);
        }
    }
</script>
